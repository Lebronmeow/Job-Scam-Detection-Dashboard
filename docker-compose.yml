version: '3.8'

services:
  db:
    image: postgres:15
    container_name: job_shield_db
    environment:
      POSTGRES_USER: shield_user
      POSTGRES_PASSWORD: shield_password
      POSTGRES_DB: shield_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
